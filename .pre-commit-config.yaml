repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.13
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
- repo: local
  hooks:
    - id: pytest
      name: pytest
      entry: uv run pytest --cov tests -v
      language: system
      pass_filenames: false
      files: ^(src|tests)/.*\.py$
