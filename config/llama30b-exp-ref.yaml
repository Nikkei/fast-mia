# Model settings
model:
  model_id: "huggyllama/llama-30b"
  trust_remote_code: true
  max_num_seqs: 256
  dtype: "bfloat16"
  quantization: "bitsandbytes"
  gpu_memory_utilization: 0.7

# sampling_parameters settings
sampling_parameters:
  max_tokens: 1
  prompt_logprobs: 0
  temperature: 0.0
  top_p: 1.0

# Data settings
data:
  # Basic settings
  data_path: "swj0419/WikiMIA"       # Path to data file or huggingface dataset name
  format: "huggingface"              # Data format (csv, jsonl, json, parquet, huggingface)

  # Column name settings
  text_column: "input"               # Name of text column
  label_column: "label"              # Name of label column

  # text split settings
  text_length: 32                    # Number of words to split (for WikiMIA dataset: 32, 64, 128, or 256)

  # Language
  space_delimited_language: true

# Evaluation methods
methods:
  - type: "ref"
    params:
      reference_model:
        model_id: "huggyllama/llama-7b"
        trust_remote_code: true
        max_num_seqs: 256
        dtype: "bfloat16"
        quantization: "bitsandbytes"
        gpu_memory_utilization: 0.2

# Output settings
output_dir: "./results"
